<!DOCTYPE html>
<html lang="en"><head><meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Meetings</title>
<style>
/*@APP_CSS@*/</style>
<script>
// theme: "auto" follows macOS; "light"/"dark" pin it. Applied pre-paint so the
// page never flashes the wrong ground. Same stt_theme key as the old panel.
(function(){const q=new URLSearchParams(location.search).get("theme");
const t=q||localStorage.getItem("stt_theme");
if(t==="light"||t==="dark")document.documentElement.dataset.theme=t;})();
</script></head><body>

<header class="hdr">
  <h1 class="wordmark">Meetings</h1>
  <!-- status pill: the ONLY place pipeline state appears; one line, by priority.
       Hidden entirely when idle. Clicking it opens the Process popover. -->
  <button id="pill" class="pill" type="button" hidden aria-live="polite"></button>
  <span class="grow"></span>
  <div class="controls">
    <!-- filter + sort sit left of search, borderless until hover -->
    <select id="filter" class="ctl" aria-label="Filter by tag"
            title="Show every meeting, or only Work / Personal ones">
      <option value="">all</option>
      <option value="work">work</option>
      <option value="personal">personal</option>
    </select>
    <!-- flagged-only chip: appears while the tray's >8 flagged aggregate is
         filtering the library to rows with lines to check; click clears it -->
    <button id="flagchip" class="flagchip" type="button" hidden
            title="Showing only meetings with flagged lines. Click to clear.">flagged only &#10005;</button>
    <select id="sort" class="ctl" aria-label="Sort and group"
            title="How the list is ordered and grouped">
      <option value="date">by month</option>
      <option value="name">by name</option>
    </select>
    <input id="search" class="search" type="search" autocomplete="off" spellcheck="false"
           placeholder="Search titles and words" aria-label="Search meetings">
    <!-- Process popover trigger. Builder B wires the popover open/close + actions. -->
    <button id="processBtn" class="btn process" type="button"
            aria-haspopup="true" aria-expanded="false"
            title="Process new recordings, pick files, pause automatic runs">Process <span class="caret">&#9662;</span></button>
    <!-- theme dot: cycles auto / light / dark, reusing the old panel convention -->
    <button id="themeDot" class="themedot" type="button" title=""></button>
    <!-- gear opens the settings drawer (Builder D): Settings · Speakers · History · Archive -->
    <button id="gear" class="btn gear" type="button"
            title="Settings, speakers, history, archive" aria-label="Settings">&#9881;</button>
  </div>
</header>

<!-- Process popover surface (the ONLY machinery surface in the shell). Rendered
     hidden; Builder B populates and wires it. -->
<div id="processPop" class="popover" hidden></div>

<main class="wrap">

  <!-- amber "needs you" tray: only present when non-empty, ranked by the server
       (stall -> failed -> review -> unknown voice). Builder B wires the row
       verbs and the "and N more" expand. -->
  <section id="tray" class="tray" hidden aria-label="Needs you"></section>

  <!-- quiet full-text search sub-list under the search field (Builder B) -->
  <div id="searchhits" class="searchhits" hidden></div>

  <!-- inline dismissible note for non-audio drops: names the accepted
       extensions (filled by app.js, dismissed by its x) -->
  <div id="dropnote" class="dropnote" hidden></div>

  <div class="timelinewrap">
    <!-- jump rail: year / month, visible only at 3+ groups with no active search -->
    <nav id="rail" class="rail" hidden aria-label="Jump to a month"></nav>
    <!-- the One Timeline: one row per meeting/file, its state read from /api/state.
         Row markup and the empty state are rendered by app.js. -->
    <section id="timeline" class="timeline" aria-label="Meetings"></section>
  </div>

</main>

<!-- Meeting page (Builder A): the in-shell #m/<base> route renders one scrollable
     document here (header, docked audio, summary, flagged strip, transcript,
     pinned ask bar), in place of the old Read + Summary + Ask surfaces. Hidden
     until a meeting route is active; its contents are built by app.js. -->
<article id="meetingpage" class="mpage" hidden aria-label="Meeting"></article>

<!-- bulk action bar: floats bottom-center when a selection exists. Builder B
     wires selection state and the /api/bulk calls. -->
<div id="bulkbar" class="bulkbar" hidden></div>

<!-- shared popover mount for the per-row menu (Builder B) -->
<div id="rowmenu" class="popover" hidden></div>

<!-- settings drawer (Builder D, the final surface): one right slide-over with a
     pinned section nav (Settings · Speakers · History · Archive). Contents are
     built by app.js; ✕ / veil / Escape close it. Sits UNDER the naming panel so
     "Who is this?" opens the existing slide-over above it. -->
<div id="drawerveil" class="dveil" hidden onclick="closeDrawer()"></div>
<aside id="drawer" class="drawer" hidden aria-label="Settings and management"></aside>

<!-- voice-naming slide-over (edit layer): opened from the tray's voice items
     and from unknown speakers in a meeting page's legend. Contents are built
     by app.js; veil click / Escape / Cancel close it. -->
<div id="nameveil" class="nveil" hidden onclick="closeNamePanel()"></div>
<aside id="namepanel" class="npanel" hidden aria-label="Name this voice"></aside>

<!-- full-page drop affordance: shown by window dragenter/over while files are
     dragged, hidden on leave/drop; pointer-events none so the drop lands on
     the window handler -->
<div id="dropveil" class="dropveil" hidden aria-hidden="true">
  <span class="dv-t">Drop audio to queue it</span>
</div>

<script>
//@APP_JS@</script></body></html>
